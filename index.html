<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Gravity Flip</title>
    <style>
        :root {
          font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            color: rgba(255, 255, 255, 0.87);
            background-color: #000000;
        }

        #app {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rotate-overlay {
          position: absolute;
          inset: 0;
          z-index: 50;
          background-color: black;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          color: white;
          padding: 24px;
          text-align: center;
          transition: opacity .2s linear
        }

        .rotate-overlay._hide {
          opacity: 1;
          z-index: -1;
        }

        .rotate-icon {
          width: 80px;
          height: 80px;
          margin-bottom: 24px;
          animation: rotateSpin 2s ease-in-out infinite;
        }

        .rotate-title {
          font-size: 30px;
          font-weight: bold;
          margin-bottom: 16px;
          color: #22d3ee; /* cyan-400 */
        }

        .rotate-text {
          color: #d1d5db; /* gray-300 */
          font-size: 18px;
        }

        .rotate-subtext {
          color: #6b7280; /* gray-500 */
          margin-top: 8px;
          font-size: 14px;
        }

        @keyframes rotateSpin {
          0% {
            transform: rotate(0deg);
          }
          50% {
            transform: rotate(90deg);
          }
          100% {
            transform: rotate(0deg);
          }
        }
    </style>
</head>

<body>
